<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAO Governance dApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.5rem; color: #38bdf8; font-weight: 700; }
    header p { font-size: 0.85rem; color: #94a3b8; }

    #connect-btn {
      background: #38bdf8; color: #0f172a; border: none; padding: 0.6rem 1.4rem;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
      transition: background 0.2s;
    }
    #connect-btn:hover { background: #7dd3fc; }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; display: grid; gap: 1.5rem; }

    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem;
    }
    .card h2 { font-size: 1.1rem; color: #7dd3fc; margin-bottom: 1rem; font-weight: 600; }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
    .info-item { background: #0f172a; border-radius: 8px; padding: 0.8rem 1rem; }
    .info-item label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-item span { font-size: 1rem; font-weight: 600; color: #e2e8f0; word-break: break-all; }

    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; margin-top: 0.5rem; }
    input[type="text"], input[type="number"], select {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      padding: 0.55rem 0.8rem; border-radius: 8px; flex: 1; min-width: 200px;
      font-size: 0.9rem;
    }
    input::placeholder { color: #475569; }

    button.action-btn {
      background: #3b82f6; color: white; border: none; padding: 0.55rem 1.2rem;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
      white-space: nowrap; transition: background 0.2s;
    }
    button.action-btn:hover { background: #2563eb; }
    button.action-btn:disabled { background: #334155; cursor: not-allowed; }

    .proposal-list { display: grid; gap: 1rem; }
    .proposal-card {
      background: #0f172a; border: 1px solid #1e3a5f; border-radius: 10px; padding: 1.2rem;
    }
    .proposal-card h3 { font-size: 0.95rem; color: #e2e8f0; margin-bottom: 0.6rem; }
    .proposal-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .badge {
      font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 600;
    }
    .badge.pending   { background: #1e3a5f; color: #7dd3fc; }
    .badge.active    { background: #14532d; color: #4ade80; }
    .badge.succeeded { background: #1a3a1a; color: #86efac; }
    .badge.defeated  { background: #3b1515; color: #f87171; }
    .badge.queued    { background: #3b2e00; color: #fbbf24; }
    .badge.executed  { background: #1e1b4b; color: #a5b4fc; }

    .vote-bar { background: #1e293b; border-radius: 4px; height: 8px; margin: 0.5rem 0; overflow: hidden; display: flex; }
    .vote-bar .for     { background: #4ade80; }
    .vote-bar .against { background: #f87171; }
    .vote-bar .abstain { background: #94a3b8; }

    .vote-counts { display: flex; gap: 1rem; font-size: 0.8rem; color: #64748b; }
    .vote-counts span { display: flex; align-items: center; gap: 0.3rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.for { background: #4ade80; }
    .dot.against { background: #f87171; }
    .dot.abstain { background: #94a3b8; }

    .vote-btns { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
    .vote-btn {
      padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
      border: none; cursor: pointer; transition: opacity 0.2s;
    }
    .vote-btn.for     { background: #166534; color: #4ade80; }
    .vote-btn.against { background: #7f1d1d; color: #f87171; }
    .vote-btn.abstain { background: #1e293b; color: #94a3b8; }
    .vote-btn:hover   { opacity: 0.8; }

    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0f172a; border-top: 1px solid #334155;
      padding: 0.6rem 2rem; font-size: 0.82rem; color: #64748b;
    }
    #status-bar.ok  { color: #4ade80; }
    #status-bar.err { color: #f87171; }

    .empty-state { text-align: center; color: #475569; padding: 2rem; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>DAO Governance</h1>
    <p>On-chain governance for GovernanceToken holders</p>
  </div>
  <button id="connect-btn" onclick="connectWallet()">Connect Wallet</button>
</header>

<main>

  <!-- Wallet Info -->
  <div class="card" id="wallet-card">
    <h2>Your Wallet</h2>
    <div class="info-grid">
      <div class="info-item">
        <label>Address</label>
        <span id="wallet-address">Not connected</span>
      </div>
      <div class="info-item">
        <label>GOV Balance</label>
        <span id="token-balance">—</span>
      </div>
      <div class="info-item">
        <label>Voting Power</label>
        <span id="voting-power">—</span>
      </div>
      <div class="info-item">
        <label>Delegating To</label>
        <span id="delegate-address">—</span>
      </div>
    </div>
  </div>

  <!-- Delegate -->
  <div class="card">
    <h2>Delegate Votes</h2>
    <p style="font-size:0.85rem; color:#64748b; margin-bottom:0.8rem;">
      Delegating to yourself activates your voting power.
    </p>
    <div class="form-row">
      <input type="text" id="delegate-input" placeholder="Delegate address (or paste your own)" />
      <button class="action-btn" onclick="delegateVotes()">Delegate</button>
    </div>
  </div>

  <!-- Proposals -->
  <div class="card">
    <h2>Active Proposals</h2>
    <div style="margin-bottom:0.8rem;">
      <button class="action-btn" onclick="loadProposals()" style="background:#0f172a; border:1px solid #334155; color:#94a3b8;">
        ↻ Refresh
      </button>
    </div>
    <div id="proposals-list">
      <div class="empty-state">Connect wallet and click Refresh to load proposals.</div>
    </div>
  </div>

</main>

<div id="status-bar">Ready. Connect your wallet to get started.</div>

<!-- ethers.js v6 via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
