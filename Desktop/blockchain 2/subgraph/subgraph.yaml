specVersion: 1.0.0
schema:
  file: ./schema.graphql
description: Indexer for the Vault and GameItems contracts deployed in Assignment 3.
repository: https://github.com/example/blockchain2-assignment3
features:
  - nonFatalErrors
dataSources:
  - kind: ethereum/contract
    name: Vault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Vault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/vault.ts
      entities:
        - VaultUser
        - DepositEvent
        - WithdrawEvent
        - HarvestEvent
      abis:
        - name: Vault
          file: ./abis/Vault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Harvest(uint256,uint256)
          handler: handleHarvest
  - kind: ethereum/contract
    name: GameItems
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GameItems
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/items.ts
      entities:
        - Player
        - ItemBalance
        - CraftEvent
      abis:
        - name: GameItems
          file: ./abis/GameItems.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: Crafted(indexed address,indexed uint256,uint256)
          handler: handleCrafted
